<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Blog Post | Wali Medugu</title>
    <meta name="description" id="meta-desc" content="Wali Medugu's reflections and thoughts." />
    <link rel="icon" type="image/jpeg" href="assets/me.jpg" />


    <!-- Open Graph -->
    <meta property="og:type" content="article" />
    <meta property="og:title" id="og-title" content="Blog Post | Wali Medugu" />
    <meta property="og:description" id="og-desc" content="Wali Medugu's reflections and thoughts." />
    <meta property="og:image" id="og-image" content="" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cream: #faf6f0;
            --warm-white: #fdf9f4;
            --sand: #e8ddd0;
            --tan: #c9b99e;
            --terracotta: #c4724a;
            --rust: #a85535;
            --brown: #5c3d2e;
            --dark: #2a1f17;
            --text: #3d2b1f;
            --text-light: #7a5c4a;
            --ink: #1a110a;
        }

        body {
            background: var(--cream);
            color: var(--text);
            font-family: 'Lora', serif;
            line-height: 1.8;
            font-size: 18px;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10003;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1.5rem;
            background: rgba(250, 246, 240, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(201, 185, 158, 0.3);
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.3rem;
            color: var(--terracotta);
            text-decoration: none;
        }

        .nav-links {
            position: fixed;
            top: 0;
            right: 1.5rem;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 2.5rem;
            list-style: none;
            z-index: 10004;
        }

        .nav-links a {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-light);
            text-decoration: none;
        }

        /* POST HEADER */
        header.post-header {
            padding: 12rem 2rem 6rem;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        .post-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--terracotta);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
            display: block;
        }

        h1.post-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            color: var(--ink);
            line-height: 1.1;
            margin-bottom: 2rem;
        }

        .post-meta {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: var(--tan);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        /* FEATURED IMAGE */
        .featured-image-container {
            max-width: 1000px;
            margin: 0 auto 6rem;
            padding: 0 2rem;
        }

        .featured-image-container img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 30px 60px rgba(92, 61, 46, 0.1);
        }

        /* CONTENT */
        .post-content {
            max-width: 800px;
            margin: 0 auto 10rem;
            padding: 0 2rem;
        }

        .post-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--ink);
            margin: 3rem 0 1.5rem;
            line-height: 1.2;
        }

        .post-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--ink);
            margin: 2rem 0 1.25rem;
        }

        .post-content p {
            margin-bottom: 1.8rem;
        }

        .post-content blockquote {
            border-left: 3px solid var(--terracotta);
            padding: 0.5rem 0 0.5rem 2rem;
            font-style: italic;
            color: var(--text-light);
            font-size: 1.2rem;
            margin: 3rem 0;
        }

        .post-content pre {
            font-family: 'DM Mono', monospace;
            background: var(--warm-white);
            border: 1px solid var(--sand);
            padding: 2rem;
            overflow-x: auto;
            margin: 2rem 0;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .post-content img {
            width: 100%;
            border-radius: 4px;
            margin: 3rem 0;
        }

        /* ACCESS RESTRICTED */
        #password-protected {
            text-align: center;
            padding: 5rem 2rem;
            background: var(--warm-white);
            border: 1px solid var(--sand);
            border-radius: 4px;
            max-width: 500px;
            margin: 0 auto 12rem;
        }

        /* FOOTER */
        footer {
            background: var(--ink);
            color: rgba(250, 246, 240, 0.35);
            text-align: center;
            padding: 4rem 2rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .hidden {
            display: none !important;
        }

        /* HAMBURGER MENU */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            z-index: 200;
            background: none;
            border: none;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .hamburger span {
            display: block;
            width: 100%;
            height: 2px;
            background: var(--brown);
            border-radius: 2px;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.25s ease;
            transform-origin: center;
        }

        .hamburger.active span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        .nav-overlay {
            display: none;
        }

        body.menu-open {
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-overlay {
                display: block;
                position: fixed;
                inset: 0;
                background: rgba(250, 246, 240, 0.97);
                backdrop-filter: blur(20px);
                z-index: 10000;
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.35s ease, visibility 0.35s ease;
            }

            .nav-overlay.active {
                opacity: 1;
                visibility: visible;
            }

            .nav-links {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 10004;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2.5rem;
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.35s ease, visibility 0.35s ease;
                pointer-events: none;
            }

            .nav-links.active {
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
            }

            .nav-links a {
                font-size: 1rem;
                letter-spacing: 0.15em;
                padding: 0.75rem 1.5rem;
            }

            .nav-links li {
                opacity: 0;
                transform: translateY(20px);
                transition: opacity 0.3s ease, transform 0.3s ease;
            }

            .nav-links.active li {
                opacity: 1;
                transform: translateY(0);
            }

            .nav-links.active li:nth-child(1) { transition-delay: 0.1s; }
            .nav-links.active li:nth-child(2) { transition-delay: 0.18s; }
            .nav-links.active li:nth-child(3) { transition-delay: 0.26s; }

            nav {
                padding: 0.75rem 1.25rem;
            }

            header.post-header {
                padding: 7rem 1.5rem 4rem;
            }

            h1.post-title {
                font-size: clamp(1.8rem, 7vw, 2.5rem);
            }

            .post-meta {
                flex-direction: column;
                gap: 0.5rem;
            }

            .post-content {
                padding: 0 1.25rem;
                margin-bottom: 6rem;
            }

            .post-content h2 {
                font-size: 1.6rem;
            }

            .post-content h3 {
                font-size: 1.3rem;
            }

            .featured-image-container {
                padding: 0 1.25rem;
                margin-bottom: 4rem;
            }

            #password-protected {
                margin: 0 1.25rem 8rem;
                padding: 3rem 1.5rem;
            }

            footer {
                padding: 1.5rem 1rem;
                font-size: 0.6rem;
            }
        }

        @media (max-width: 480px) {
            nav {
                padding: 0.6rem 1rem;
            }

            .nav-logo img {
                height: 42px !important;
            }

            header.post-header {
                padding: 6rem 1rem 3rem;
            }

            h1.post-title {
                font-size: clamp(1.5rem, 8vw, 2rem);
            }

            .post-content {
                padding: 0 1rem;
            }

            .post-content h2 {
                font-size: 1.4rem;
            }

            .featured-image-container {
                padding: 0 1rem;
            }

            #password-protected {
                margin: 0 1rem 6rem;
                padding: 2rem 1rem;
            }
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="nav-logo" aria-label="Wali Medugu Home">
            <img src="assets/sign_transparent.png" alt="Wali Medugu Logo"
                style="height: 56px; width: auto; object-fit: contain;">
        </a>
        <button class="hamburger" id="hamburger-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>
    <div class="nav-overlay" id="nav-overlay"></div>
    <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="blog.html">Blog</a></li>
    </ul>

    <article id="post-view">
        <header class="post-header">
            <span class="post-label" id="post-category">Reflections</span>
            <h1 class="post-title" id="post-title">Loading...</h1>
            <div class="post-meta">
                <span id="post-date">March 2025</span>
                <span id="post-read-time">5 min read</span>
                <a href="#" id="edit-link" class="hidden" style="color: var(--terracotta); text-decoration: none;">(Edit
                    Post)</a>
            </div>
        </header>

        <div class="featured-image-container hidden" id="featured-image">
            <img src="" alt="" id="post-image">
        </div>

        <div id="password-protected" class="hidden">
            <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 1rem;">This entry is private</h2>
            <p style="margin-bottom: 2rem;">Please enter the password to read this reflection.</p>
            <form id="password-form" style="display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;">
                <input type="password" id="entry-password" placeholder="Password"
                    style="padding: 0.75rem; border: 1px solid var(--sand); border-radius: 2px; min-width: 0; flex: 1; max-width: 200px;">
                <button type="submit" class="auth-submit" style="padding: 0.75rem 1.5rem;">Unlock</button>
            </form>
            <p id="password-error" class="hidden" style="color: var(--rust); font-size: 0.8rem; margin-top: 1rem;">
                Incorrect password.</p>
        </div>

        <div class="post-content" id="post-content">
            <!-- Blocks injected here -->
        </div>
    </article>

    <footer>
        <p>© 2025 <em>Wali Medugu</em> — Made with care</p>
    </footer>

    <script>
        // Hamburger menu toggle
        (function() {
            const hamburger = document.getElementById('hamburger-toggle');
            const navLinks = document.getElementById('nav-links');
            const navOverlay = document.getElementById('nav-overlay');
            
            function toggleMenu() {
                const isOpen = hamburger.classList.toggle('active');
                navLinks.classList.toggle('active');
                navOverlay.classList.toggle('active');
                document.body.classList.toggle('menu-open');
                hamburger.setAttribute('aria-expanded', isOpen);
            }
            
            function closeMenu() {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
                navOverlay.classList.remove('active');
                document.body.classList.remove('menu-open');
                hamburger.setAttribute('aria-expanded', 'false');
            }
            
            hamburger.addEventListener('click', toggleMenu);
            navOverlay.addEventListener('click', closeMenu);
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', closeMenu);
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeMenu();
            });
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) closeMenu();
            });
        })();

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('post-title').textContent = "Reflection Not Found";
            document.getElementById('post-content').innerHTML = `<p style="text-align: center; color: var(--tan); padding: 4rem;">This particular thought seems to have vanished into the ether.</p>`;
        });
    </script>
</body>

</html>
