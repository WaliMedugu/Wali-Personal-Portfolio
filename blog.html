    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cream: #faf6f0;
            --warm-white: #fdf9f4;
            --sand: #e8ddd0;
            --tan: #c9b99e;
            --terracotta: #c4724a;
            --rust: #a85535;
            --brown: #5c3d2e;
            --dark: #2a1f17;
            --text: #3d2b1f;
            --text-light: #7a5c4a;
            --ink: #1a110a;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--cream);
            color: var(--text);
            font-family: 'Lora', serif;
            font-size: 17px;
            line-height: 1.7;
            overflow-x: hidden;
            width: 100%;
        }

        /* Grain texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.6;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10003;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1.5rem;
            background: rgba(250, 246, 240, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(201, 185, 158, 0.3);
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.3rem;
            color: var(--terracotta);
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        .nav-links {
            position: fixed;
            top: 0;
            right: 1.5rem;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 2.5rem;
            list-style: none;
            z-index: 10004;
        }

        .nav-links a {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--terracotta);
        }

        /* HEADER */
        header {
            padding: 10rem 3rem 6rem;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        .label {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--terracotta);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            color: var(--ink);
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        p.desc {
            font-size: 1.1rem;
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
        }

        /* BLOG LIST */
        .blog-container {
            max-width: 900px;
            margin: 0 auto 10rem;
            padding: 0 3rem;
        }

        .post-card {
            background: var(--warm-white);
            border: 1px solid var(--sand);
            padding: 3rem;
            margin-bottom: 2rem;
            border-radius: 4px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(92, 61, 46, 0.08);
            border-color: var(--tan);
        }

        .post-meta {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: var(--tan);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .post-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--ink);
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .post-card p {
            color: var(--text-light);
            font-size: 1rem;
            line-height: 1.7;
        }

        .read-more {
            margin-top: 1.5rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--terracotta);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: inline-block;
        }

        /* FOOTER */
        footer {
            background: var(--ink);
            color: rgba(250, 246, 240, 0.35);
            text-align: center;
            padding: 4rem 2rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        footer em {
            color: var(--terracotta);
            font-style: normal;
        }

        /* HAMBURGER MENU */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            z-index: 200;
            background: none;
            border: none;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .hamburger span {
            display: block;
            width: 100%;
            height: 2px;
            background: var(--brown);
            border-radius: 2px;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.25s ease;
            transform-origin: center;
        }

        .hamburger.active span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        .nav-overlay {
            display: none;
        }

        body.menu-open {
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-overlay {
                display: block;
                position: fixed;
                inset: 0;
                background: rgba(250, 246, 240, 0.97);
                backdrop-filter: blur(20px);
                z-index: 10000;
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.35s ease, visibility 0.35s ease;
            }

            .nav-overlay.active {
                opacity: 1;
                visibility: visible;
            }

            .nav-links {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                height: 100vh;
                z-index: 10004;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2.5rem;
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.35s ease, visibility 0.35s ease;
                pointer-events: none;
            }

            .nav-links.active {
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
            }

            .nav-links a {
                font-size: 1rem;
                letter-spacing: 0.15em;
                padding: 0.75rem 1.5rem;
            }

            .nav-links li {
                opacity: 0;
                transform: translateY(20px);
                transition: opacity 0.3s ease, transform 0.3s ease;
            }

            .nav-links.active li {
                opacity: 1;
                transform: translateY(0);
            }

            .nav-links.active li:nth-child(1) { transition-delay: 0.1s; }
            .nav-links.active li:nth-child(2) { transition-delay: 0.18s; }
            .nav-links.active li:nth-child(3) { transition-delay: 0.26s; }
            .nav-links.active li:nth-child(4) { transition-delay: 0.34s; }

            nav {
                padding: 0.75rem 1.25rem;
            }

            header {
                padding: 7rem 1.5rem 4rem;
                width: 100%;
                box-sizing: border-box;
            }

            h1 {
                font-size: clamp(2rem, 7vw, 3rem);
            }

            p.desc {
                font-size: 0.95rem;
            }

            .post-card {
                padding: 1.75rem;
                margin-left: 0;
                margin-right: 0;
                width: 100%;
            }

            .post-card h2 {
                font-size: 1.4rem;
            }

            .post-card p {
                font-size: 0.9rem;
            }

            .blog-container {
                padding: 0 1.25rem;
                margin-bottom: 6rem;
            }

            footer {
                padding: 1.5rem 1rem;
                font-size: 0.6rem;
            }
        }

        @media (max-width: 480px) {
            nav {
                padding: 0.6rem 1rem;
            }

            .nav-logo img {
                height: 42px !important;
            }

            header {
                padding: 6rem 1rem 3rem;
            }

            h1 {
                font-size: clamp(1.6rem, 8vw, 2.2rem);
            }

            p.desc {
                font-size: 0.88rem;
            }

            .post-card {
                padding: 1.25rem;
            }

            .post-card h2 {
                font-size: 1.2rem;
            }

            .blog-container {
                padding: 0 1rem;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="nav-logo" aria-label="Wali Medugu Home">
            <img src="assets/sign_transparent.png" alt="Wali Medugu Logo"
                style="height: 56px; width: auto; object-fit: contain;">
        </a>
        <button class="hamburger" id="hamburger-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>
    <div class="nav-overlay" id="nav-overlay"></div>
    <ul class="nav-links" id="nav-links">
        <li style="--i:1"><a href="index.html">Home</a></li>
        <li style="--i:2"><a href="projects.html">Projects</a></li>
        <li style="--i:3"><a href="blog.html">Blog</a></li>
        <li style="--i:4"><a href="index.html#contact">Contact</a></li>
    </ul>

    <header>
        <span class="label">Thoughts & Reflections</span>
        <h1>The <em>Blog</em></h1>
        <p class="desc">A quiet space for ideas, lessons, and reflections on code, art, and the world.</p>
    </header>

    <main class="blog-container" id="posts-container">
        <!-- Posts will be injected here -->
    </main>

    <footer>
        <p>© 2025 <em>Wali Medugu</em> — Made with care</p>
    </footer>

    <!-- Scripts -->
    <script src="assets/posts.js"></script>
    <script>
        // Hamburger menu toggle
        (function() {
            const hamburger = document.getElementById('hamburger-toggle');
            const navLinks = document.getElementById('nav-links');
            const navOverlay = document.getElementById('nav-overlay');
            
            function toggleMenu() {
                const isOpen = hamburger.classList.toggle('active');
                navLinks.classList.toggle('active');
                navOverlay.classList.toggle('active');
                document.body.classList.toggle('menu-open');
                hamburger.setAttribute('aria-expanded', isOpen);
            }
            
            function closeMenu() {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
                navOverlay.classList.remove('active');
                document.body.classList.remove('menu-open');
                hamburger.setAttribute('aria-expanded', 'false');
            }
            
            hamburger.addEventListener('click', toggleMenu);
            navOverlay.addEventListener('click', closeMenu);
            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', closeMenu);
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeMenu();
            });
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) closeMenu();
            });
        })();

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('posts-container');
            
            if (typeof posts !== 'undefined' && posts.length > 0) {
                container.innerHTML = posts.map(post => `
                    <a href="${post.link}" class="post-card">
                        <div class="post-meta">
                            <span>${post.date}</span>
                        </div>
                        <h2>${post.title}</h2>
                        <p>${post.excerpt}</p>
                        <span class="read-more">Read Reflection →</span>
                    </a>
                `).join('');
            } else {
                container.innerHTML = `<p style="text-align: center; color: var(--tan); padding: 4rem;">The ink hasn't dried on any thoughts yet.</p>`;
            }
        });
    </script>
</body>

</html>
